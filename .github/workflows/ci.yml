name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  NODE_VERSION: "22.16.0"
  PNPM_VERSION: "9.15.9"

jobs:
  quality:
    name: Lint, typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run unit and API tests
        run: pnpm test

      - name: Run build
        run: pnpm build

  e2e:
    name: Playwright smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://pokemon:pokemon_ci_test@localhost:5432/pokemon_champions?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pokemon
          POSTGRES_PASSWORD: pokemon_ci_test
          POSTGRES_DB: pokemon_champions
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pokemon -d pokemon_champions"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Apply Prisma migrations
        run: pnpm --filter @pokemon-champions/database db:deploy

      - name: Build workspace for E2E
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm --filter @pokemon-champions/web exec playwright install --with-deps chromium

      - name: Run Playwright smoke test
        run: pnpm --filter @pokemon-champions/web exec playwright test e2e/smoke.spec.ts
        env:
          DEBUG: pw:webserver

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/test-results/
          if-no-files-found: warn
          retention-days: 7
